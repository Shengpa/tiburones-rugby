<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#003087"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Tiburones Rugby</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtbHCCFpkuFxdJQBMUMVYKRaTCKDvw5vA",
  authDomain: "kiosco-liceo.firebaseapp.com",
  databaseURL: "https://kiosco-liceo-default-rtdb.firebaseio.com",
  projectId: "kiosco-liceo",
  storageBucket: "kiosco-liceo.firebasestorage.app",
  messagingSenderId: "650410053332",
  appId: "1:650410053332:web:c61ee15e64d461192c7541"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'tiburones_v2';

window._fbSet = (data) => set(ref(db, DB_PATH), data);
window._fbOnValue = (cb) => onValue(ref(db, DB_PATH), snap => cb(snap.val()));
window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --azul:#003087;--azul2:#0047CC;--azulclaro:#e8f0ff;
  --verde:#16a34a;--rojo:#dc2626;--amarillo:#d97706;--naranja:#ea580c;
  --blanco:#fff;--blancof:#f4f7ff;--blancog:#e0e8f7;
  --txt:#0a1628;--txt2:#334155;--txt3:#64748b;
  --border:#c5d4ed;--shadow:rgba(0,48,135,0.15);
}
html,body{min-height:100%;background:var(--blancof);color:var(--txt);font-family:'Lato',sans-serif;overflow-x:hidden}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--azul);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loadingScreen .logo{width:90px;height:90px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,0.4)}
#loadingScreen .logo img{width:100%;height:100%;object-fit:cover}
#loadingScreen h1{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;text-transform:uppercase}
#loadingScreen .sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SYNC */
#syncBar{position:fixed;top:0;left:0;right:0;z-index:999;height:3px;background:var(--verde);transform:scaleX(0);transform-origin:left;transition:transform .3s,opacity .5s}
#syncBar.syncing{transform:scaleX(1);opacity:1}
#syncBar.done{transform:scaleX(1);opacity:0}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--azul);z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#loginScreen.show{display:flex}
.login-logo{width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,0.3);margin-bottom:12px}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:4px}
.login-sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;margin-bottom:32px}
.login-box{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:24px;width:100%;max-width:340px}
.login-select{width:100%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:#fff;padding:12px 14px;border-radius:10px;font-size:15px;margin-bottom:14px;outline:none}
.login-select option{background:#003087;color:#fff}
.pin-display{display:flex;justify-content:center;gap:10px;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;transition:background .15s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.pin-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-family:'Oswald',sans-serif;font-size:22px;padding:16px;border-radius:12px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.pin-btn:active{background:rgba(255,255,255,0.3)}
.pin-btn.del{font-size:16px}
.login-error{color:#fca5a5;font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.login-hint{color:rgba(255,255,255,0.4);font-size:11px;text-align:center;margin-top:12px}

/* USER BADGE in header */
#userBadge{font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:1px;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.2)}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:var(--azul);border-bottom:3px solid var(--azul2);box-shadow:0 4px 20px var(--shadow)}
#header-top{display:flex;align-items:center;gap:10px;padding:8px 12px}
.logo-sm{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,0.3)}
.logo-sm img{width:100%;height:100%;object-fit:cover}
.brand{flex:1;min-width:0}
.brand-name{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;color:#fff;text-transform:uppercase}
.brand-sub{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase}
#nav{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,0.1)}
#nav::-webkit-scrollbar{display:none}
#nav button{flex:1;min-width:52px;padding:10px 6px;background:transparent;color:rgba(255,255,255,0.5);border:none;cursor:pointer;font-size:19px;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;line-height:1}
#nav button.active{color:#fff;border-bottom-color:#7eb3ff;background:rgba(255,255,255,0.07)}

/* STATS BAR */
#statsBar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;max-width:700px;margin:0 auto}
.sbar{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:0 1px 4px var(--shadow)}
.sbar-val{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700}
.sbar-lbl{font-size:9px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* CONTENT */
#content{max-width:700px;margin:0 auto;padding:0 12px 100px}

/* FAB */
#fab{position:fixed;bottom:24px;right:24px;z-index:90;width:56px;height:56px;border-radius:50%;background:var(--azul);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(0,48,135,0.5);display:flex;align-items:center;justify-content:center}
#micBtn{position:fixed;bottom:24px;left:24px;z-index:90;width:56px;height:56px;border-radius:50%;background:var(--azul);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(0,48,135,0.5);display:none;align-items:center;justify-content:center;transition:background .2s}
#micBtn.listening{background:var(--rojo);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.5)}50%{box-shadow:0 0 0 12px rgba(220,38,38,0)}}
#voiceToast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;z-index:500;display:none;white-space:nowrap;max-width:90vw;text-align:center;overflow:hidden;text-overflow:ellipsis}
#voiceToast.show{display:block}
#fab:active{transform:scale(.92)}

/* PLAYER CARDS */
.jugador-card{background:var(--blanco);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px var(--shadow);cursor:pointer;transition:transform .1s}
.jugador-card:active{transform:scale(.98)}
.jugador-num{width:42px;height:42px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;flex-shrink:0}
.jugador-info{flex:1;min-width:0}
.jugador-nombre{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:0.5px}
.jugador-pos{font-size:12px;color:var(--txt3);margin-top:2px}
.jugador-stats{display:flex;gap:12px;margin-top:6px}
.jstat{text-align:center}
.jstat-val{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--azul)}
.jstat-lbl{font-size:9px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase}
.lesion-badge{background:#fef2f2;border:1px solid #fecaca;color:var(--rojo);font-size:10px;font-family:'Oswald',sans-serif;letter-spacing:1px;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:4px}

/* PARTIDO EN VIVO */
.scoreboard{background:var(--azul);border-radius:14px;padding:20px;margin-bottom:14px;text-align:center}
.score-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.score-team{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.7);text-transform:uppercase;flex:1}
.score-nums{display:flex;align-items:center;gap:16px}
.score-num{font-family:'Oswald',sans-serif;font-size:52px;font-weight:700;color:#fff;line-height:1}
.score-sep{font-family:'Oswald',sans-serif;font-size:28px;color:rgba(255,255,255,0.4)}
.score-btns{display:flex;gap:8px;justify-content:center}
.score-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;border-radius:8px;padding:8px 18px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer}
.score-btn:active{background:rgba(255,255,255,0.3)}

/* BUSQUEDA JUGADORES en partido */
.live-search{width:100%;background:var(--blanco);border:2px solid var(--border);color:var(--txt);padding:12px 14px;border-radius:10px;font-family:'Oswald',sans-serif;font-size:16px;outline:none;margin-bottom:8px}
.live-search:focus{border-color:var(--azul)}
.live-jugador{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px var(--shadow)}
.live-num{width:36px;height:36px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;flex-shrink:0}
.live-nombre{font-family:'Oswald',sans-serif;font-size:15px;flex:1}
.live-pos{font-size:12px;color:var(--txt3)}
.stat-btns{display:flex;gap:6px;flex-wrap:wrap}
.stat-btn{background:var(--azulclaro);border:1px solid var(--border);color:var(--azul);border-radius:8px;padding:6px 10px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:background .1s}
.stat-btn:active{background:var(--azul2);color:#fff}
.stat-btn.neg{background:#fef2f2;border-color:#fecaca;color:var(--rojo)}
.stat-btn.tarjeta-am{background:#fef9c3;border-color:#fde047;color:#92400e}
.stat-btn.tarjeta-ro{background:#fef2f2;border-color:#fca5a5;color:var(--rojo)}

/* FICHA JUGADOR */
.ficha-header{background:linear-gradient(135deg,var(--azul),var(--azul2));border-radius:14px;padding:24px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.ficha-num{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.15);border:3px solid rgba(255,255,255,0.4);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;flex-shrink:0}
.ficha-nombre{font-family:'Oswald',sans-serif;font-size:22px;color:#fff;letter-spacing:1px}
.ficha-pos{font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px;letter-spacing:2px;text-transform:uppercase}
.ficha-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.ficha-stat{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px var(--shadow)}
.ficha-stat-val{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--azul)}
.ficha-stat-lbl{font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.chart-container{background:var(--blanco);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.chart-title{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:12px}

/* HISTORIAL */
.partido-card{background:var(--blanco);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow)}
.partido-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.partido-rival{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:1px}
.partido-fecha{font-size:12px;color:var(--txt3)}
.resultado-badge{font-family:'Oswald',sans-serif;font-size:14px;padding:4px 12px;border-radius:20px;letter-spacing:1px}
.resultado-w{background:rgba(22,163,74,0.1);color:var(--verde);border:1px solid rgba(22,163,74,0.3)}
.resultado-l{background:rgba(220,38,38,0.08);color:var(--rojo);border:1px solid rgba(220,38,38,0.2)}
.resultado-d{background:#f0f7ff;color:var(--azul);border:1px solid var(--border)}

/* RANKING */
.ranking-card{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px var(--shadow)}
.rank-pos{width:30px;font-family:'Oswald',sans-serif;font-size:18px;color:var(--txt3);text-align:center;flex-shrink:0}
.rank-pos.gold{color:#d97706}
.rank-pos.silver{color:#64748b}
.rank-pos.bronze{color:#92400e}
.rank-bar-wrap{flex:1;height:8px;background:var(--blancog);border-radius:4px;overflow:hidden;margin-top:4px}
.rank-bar{height:100%;background:var(--azul);border-radius:4px;transition:width .4s}

/* POSICIONES */
.pos-group{margin-bottom:16px}
.pos-group-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px;padding:4px 0;border-bottom:2px solid var(--border)}
.pos-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--blancog)}
.pos-stat-row:last-child{border:none}

/* LESIONES */
.lesion-card{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 4px var(--shadow)}
.lesion-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px}
.lesion-dot.activa{background:var(--rojo)}
.lesion-dot.resuelta{background:var(--verde)}

/* ASISTENCIA */
.asist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.asist-btn{padding:10px;border-radius:8px;border:2px solid var(--border);background:var(--blancof);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;text-align:center}
.asist-btn.presente{background:rgba(22,163,74,0.1);border-color:var(--verde);color:var(--verde)}
.asist-btn.ausente{background:rgba(220,38,38,0.06);border-color:#fca5a5;color:var(--rojo)}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,10,40,0.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#overlay.open{display:flex}
#modal{background:var(--blanco);border-top:4px solid var(--azul);border-radius:20px 20px 0 0;padding:24px 18px 36px;width:100%;max-width:480px;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal h2{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px;color:var(--azul)}
#modal .sub{color:var(--txt3);font-size:14px;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{font-size:11px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--blancof);border:1px solid var(--border);color:var(--txt);padding:11px 14px;border-radius:8px;font-family:inherit;font-size:16px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--azul2)}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-cancel{flex:1;background:var(--blancof);color:var(--txt3);border:1px solid var(--border);padding:13px;border-radius:8px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px}
.btn-confirm{flex:2;background:var(--azul);color:#fff;border:none;padding:13px;border-radius:8px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:3px;font-weight:700}
.btn-confirm.red{background:var(--rojo)}
.btn-confirm.green{background:var(--verde)}
.tab-bar{display:flex;gap:0;background:var(--blancog);border-radius:10px;padding:4px;margin-bottom:14px}
.tab-bar button{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:7px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;color:var(--txt3);cursor:pointer;transition:all .2s}
.tab-bar button.active{background:var(--blanco);color:var(--azul);box-shadow:0 1px 4px var(--shadow)}
.empty{text-align:center;padding:50px 20px;color:var(--txt3);font-size:16px}
.sec-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;padding-top:4px}


/* CANCHA */
.cancha-wrap{position:relative;width:100%;max-width:420px;margin:0 auto 14px;border-radius:12px;overflow:hidden;border:2px solid #1a6b2a}
.cancha-svg{width:100%;display:block}
.cancha-jugador{cursor:pointer;transition:transform .1s}
.cancha-jugador:active{transform:scale(0.92)}
.cancha-tabs{display:flex;gap:0;background:var(--blancog);border-radius:10px;padding:3px;margin-bottom:12px}
.cancha-tabs button{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:7px;font-size:11px;letter-spacing:1px;color:var(--txt3);cursor:pointer;font-family:'Oswald',sans-serif;transition:all .2s}
.cancha-tabs button.active{background:var(--blanco);color:var(--azul);box-shadow:0 1px 4px var(--shadow)}
.suplente-row{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.suplente-num{width:32px;height:32px;border-radius:50%;background:var(--blancog);color:var(--txt3);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:13px;flex-shrink:0;border:1px solid var(--border)}
/* MIC BUTTON */
#micBtn{position:fixed;bottom:90px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--azul);border:3px solid rgba(255,255,255,0.3);color:#fff;font-size:26px;cursor:pointer;z-index:300;box-shadow:0 4px 16px rgba(0,48,135,0.4);display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
#micBtn.visible{display:flex}
#micBtn.listening{background:#dc2626;border-color:#fca5a5;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)}50%{box-shadow:0 0 0 12px rgba(220,38,38,0)}}
#micFeedback{position:fixed;bottom:160px;right:16px;background:rgba(0,0,0,0.85);color:#fff;padding:10px 14px;border-radius:12px;font-size:13px;max-width:220px;text-align:center;z-index:300;display:none;line-height:1.4}
#micFeedback.show{display:block}

/* VOZ */
#voiceBtn{position:fixed;bottom:90px;right:20px;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:22px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:all .2s;-webkit-tap-highlight-color:transparent}
#voiceBtn.idle{background:#003087}
#voiceBtn.listening{background:#dc2626;animation:pulse 1s infinite}
#voiceBtn.success{background:#16a34a}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
#voiceToast{position:fixed;bottom:152px;right:16px;background:rgba(0,0,0,0.82);color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;display:none;max-width:200px;text-align:center;z-index:201;pointer-events:none}

/* MINI PANEL CANCHA */
#miniPanel{position:fixed;z-index:500;background:var(--azul);border-radius:14px;padding:10px 12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);display:none;flex-direction:column;align-items:center;gap:8px;min-width:160px;border:2px solid rgba(255,255,255,0.2)}
#miniPanel.show{display:flex;animation:popIn .15s ease}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
#miniPanel .mp-nombre{font-family:'Oswald',sans-serif;font-size:13px;color:rgba(255,255,255,0.7);letter-spacing:1px;text-align:center;white-space:nowrap;overflow:hidden;max-width:150px;text-overflow:ellipsis}
#miniPanel .mp-btns{display:flex;gap:8px}
#miniPanel .mp-btn{padding:12px 16px;border:none;border-radius:10px;font-family:'Oswald',sans-serif;font-size:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;font-weight:700;transition:transform .1s}
#miniPanel .mp-btn:active{transform:scale(0.92)}
#miniPanel .mp-btn span{font-size:9px;letter-spacing:1px;font-weight:400}
#miniPanel .mp-btn.tackle{background:rgba(255,255,255,0.15);color:#fff}
#miniPanel .mp-btn.try{background:#16a34a;color:#fff}
#miniPanel .mp-close{font-size:10px;color:rgba(255,255,255,0.4);cursor:pointer;letter-spacing:1px}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--azul);border-radius:10px;color:#fff;padding:11px 20px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;box-shadow:0 4px 20px var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

function fmtPeso(n){return '$'+(n||0).toLocaleString('es-AR');}
function fmtNum(n){return (n||0).toString();}

function fuzzyMatch(texto, busqueda) {
  if(!busqueda) return true;
  const t = texto.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const b = busqueda.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  // Coincidencia exacta parcial
  if(t.includes(b)) return true;
  // Coincidencia fuzzy: todos los caracteres de búsqueda aparecen en orden
  let bi = 0;
  for(let i=0; i<t.length && bi<b.length; i++) {
    if(t[i]===b[bi]) bi++;
  }
  return bi===b.length;
}

function statsJugador(j) {
  const partidos = (estado.partidos||[]).filter(p=>p.stats&&p.stats[String(j.id)]);
  const base = {tackles:0,tries:0,pases:0,metros:0,tarjetasAm:0,tarjetasRo:0,partidos:partidos.length};
  partidos.forEach(p=>{
    const s=p.stats[String(j.id)];
    base.tackles+=(s.tackles||0);
    base.tries+=(s.tries||0);
    base.pases+=(s.pases||0);
    base.metros+=(s.metros||0);
    base.tarjetasAm+=(s.tarjetasAm||0);
    base.tarjetasRo+=(s.tarjetasRo||0);
  });
  return base;
}

function lesionActiva(jId) {
  return (estado.lesiones||[]).some(l=>l.jugadorId===jId&&l.activa);
}

function syncBar(on){
  const b=document.getElementById('syncBar');
  if(on){b.className='syncing';}else{b.className='done';setTimeout(()=>b.className='',600);}
}

async function guardar(){
  if(!fbReady)return;
  syncBar(true);
  pausarListener=true;
  try{
    const snap=JSON.parse(JSON.stringify(estado));
    await window._fbSet(snap);
  }catch(e){console.error(e);toast('⚠️ Error al sincronizar');}
  await new Promise(r=>setTimeout(r,800));
  pausarListener=false;
  syncBar(false);
}

function iniciarSync(){
  window._fbOnValue(data=>{
    if(pausarListener&&fbReady)return;
    if(data){
      estado=data;
      if(!estado.jugadores)estado.jugadores=[];
      if(!estado.partidos)estado.partidos=[];
      if(!estado.asistencia)estado.asistencia={};
      if(!estado.lesiones)estado.lesiones=[];
      if(!estado.usuarios)estado.usuarios=[];
    }
    if(!fbReady){
      fbReady=true;
      document.getElementById('loadingScreen').style.display='none';
      // Try restore session
      const saved = sessionStorage.getItem(SESSION_KEY);
      if(saved){
        try{
          const u = JSON.parse(saved);
          // Verify user still exists and pin matches
          const found = (estado.usuarios||[]).find(x=>String(x.id)===String(u.id)&&x.pin===u.pin);
          if(found){ currentUser=found; mostrarApp(); return; }
        }catch(e){}
      }
      // No valid session — seed admin if no users exist
      if(!estado.usuarios||estado.usuarios.length===0){
        seedAdminYMostrarApp();
      } else {
        mostrarLogin();
      }
    }else{
      render();
    }
  });
}

async function seedAdminYMostrarApp(){
  // Create default admin on first run
  if(!estado.usuarios)estado.usuarios=[];
  estado.usuarios.push({id:Date.now(),nombre:'Admin',rol:'admin',pin:'1234'});
  await guardar();
  mostrarLogin();
  toast('👋 Usuario admin creado con PIN 1234 — cambialo en Configuración');
}

function mostrarLogin(){
  const loginScreen = document.getElementById('loginScreen');
  loginScreen.classList.add('show');
  const sel = document.getElementById('loginUserSel');
  sel.innerHTML = '<option value="">Seleccioná tu usuario...</option>' +
    (estado.usuarios||[]).map(u=>'<option value="'+u.id+'">'+u.nombre+' ('+u.rol+')</option>').join('');
  pinBuffer='';
  actualizarPinDots();
  document.getElementById('loginError').textContent='';
  document.getElementById('loginHint').textContent='';
}

function mostrarApp(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('app').style.display='block';
  document.getElementById('userBadgeName').textContent=currentUser.nombre;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({id:currentUser.id,pin:currentUser.pin}));
  setVista('jugadores');
}

function loginSelChange(){
  pinBuffer='';
  actualizarPinDots();
  document.getElementById('loginError').textContent='';
  const sel=document.getElementById('loginUserSel');
  document.getElementById('loginHint').textContent=sel.value?'Ingresá tu PIN':'';
}

function pinPress(d){
  if(pinBuffer.length>=4)return;
  pinBuffer+=d;
  actualizarPinDots();
  if(pinBuffer.length===4) setTimeout(intentarLogin,150);
}

function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1);
  actualizarPinDots();
  document.getElementById('loginError').textContent='';
}

function actualizarPinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
  }
}

function intentarLogin(){
  const sel=document.getElementById('loginUserSel');
  const uid=sel.value;
  if(!uid){ document.getElementById('loginError').textContent='Seleccioná un usuario primero'; pinBuffer='';actualizarPinDots();return; }
  const u=(estado.usuarios||[]).find(x=>String(x.id)===String(uid));
  if(!u){ document.getElementById('loginError').textContent='Usuario no encontrado'; pinBuffer='';actualizarPinDots();return; }
  if(u.pin!==pinBuffer){
    document.getElementById('loginError').textContent='PIN incorrecto';
    pinBuffer='';actualizarPinDots();
    return;
  }
  currentUser=u;
  mostrarApp();
}

function cerrarSesion(){
  if(!confirm('¿Cerrar sesión?'))return;
  currentUser=null;
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('app').style.display='none';
  mostrarLogin();
}

function renderCancha(p) {
  const titulares = getTitulares(p);
  const jugadores = estado.jugadores || [];

  let svgSlots = '';
  POSICIONES_CANCHA.forEach((slot, idx) => {
    const jugId = titulares[idx];
    const jug = jugId ? jugadores.find(j => j.id == jugId) : null;
    const ps = jug && p.stats && p.stats[String(jug.id)] ? p.stats[String(jug.id)] : {};
    const tackles = ps.tackles || 0;
    const apellido = jug ? (jug.apodo ? jug.apodo.substring(0,8) : jug.nombre.split(' ')[0].substring(0,8)) : slot.pos.substring(0,5);
    const filled = !!jug;
    const enMovimiento = moverPendiente && moverPendiente.slotIdx === idx;
    const bg = enMovimiento ? '#d97706' : filled ? '#003087' : '#1a5c2e';
    const border = enMovimiento ? '#fcd34d' : filled ? '#7eb3ff' : '#4ade80';
    const textColor = filled ? '#fff' : 'rgba(255,255,255,0.5)';

    svgSlots += '<g transform="translate(' + slot.x + ',' + slot.y + ')">';
    svgSlots += '<circle r="22" fill="' + bg + '" stroke="' + border + '" stroke-width="' + (filled?2:1) + '" opacity="' + (filled?1:0.7) + '"/>';
    svgSlots += '<text y="-6" text-anchor="middle" font-size="11" font-weight="700" fill="' + textColor + '" font-family="Oswald,sans-serif">' + slot.label + '</text>';
    svgSlots += '<text y="7" text-anchor="middle" font-size="7.5" fill="' + textColor + '" font-family="Lato,sans-serif">' + apellido + '</text>';

      svgSlots += '<circle r="9" cx="16" cy="-14" fill="#dc2626" stroke="#fff" stroke-width="1.5"/>';
      svgSlots += '<text x="16" y="-10" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="Oswald,sans-serif">' + tackles + '</text>';
    }
    // Transparent hit area — handles both click and touch reliably
    svgSlots += '<circle r="26" fill="transparent" data-idx="' + idx + '" data-pid="' + p.id + '" class="slot-hit"/>';
    svgSlots += '</g>';
  });

  return '<div class="cancha-wrap" id="canchaWrap">' +
    '<svg class="cancha-svg" viewBox="0 0 300 520" xmlns="http://www.w3.org/2000/svg">' +
    '<rect width="300" height="520" fill="#166534"/>' +

    '<line x1="14" y1="56" x2="286" y2="56" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>' +
    '<rect x="14" y="14" width="272" height="42" fill="rgba(255,255,255,0.05)"/>' +
    '<line x1="14" y1="220" x2="286" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="6,4"/>' +
    '<text x="150" y="217" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.25)" font-family="Oswald,sans-serif" letter-spacing="2">22m</text>' +
    '<line x1="122" y1="14" x2="122" y2="46" stroke="rgba(255,255,255,0.65)" stroke-width="2.5"/>' +
    '<line x1="178" y1="14" x2="178" y2="46" stroke="rgba(255,255,255,0.65)" stroke-width="2.5"/>' +
    '<line x1="122" y1="30" x2="178" y2="30" stroke="rgba(255,255,255,0.65)" stroke-width="2.5"/>' +
    '<text x="150" y="500" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.35)" font-family="Oswald,sans-serif" letter-spacing="4">TIBURONES</text>' +
    svgSlots +
    '</svg>' +
    '</div>';
}

let _mpPartidoId = null;
let _mpJugadorId = null;
let _mpSlotIdx = null;

function tocarsSlot(slotIdx, partidoId) {
  const p = (estado.partidos||[]).find(x=>x.id==partidoId);
  if (!p) return;
  if (!p.titulares) p.titulares = {};
  const jugId = p.titulares[slotIdx];

  // Si hay un movimiento pendiente — intercambiar posiciones
  if (moverPendiente !== null) {
    const {slotIdx: slotOrigen} = moverPendiente;
    moverPendiente = null;
    if (slotOrigen === slotIdx) { render(); return; } // mismo slot
    // Intercambiar
    const jugOrigen = p.titulares[slotOrigen];
    const jugDestino = p.titulares[slotIdx];
    if(jugDestino) p.titulares[slotOrigen] = jugDestino;
    else delete p.titulares[slotOrigen];
    p.titulares[slotIdx] = jugOrigen;
    guardar();
    render();
    toast('🔀 Posiciones intercambiadas');
    return;
  }

  // Si hay un suplente pendiente — hacer cambio
  if (suplentePendiente !== null) {
    if (jugId) {
      hacerCambio(slotIdx, partidoId, suplentePendiente);
    } else {
      asignarTitular(slotIdx, partidoId, suplentePendiente);
    }
    suplentePendiente = null;
    return;
  }

  if (jugId) {
    // Mostrar mini panel flotante
    const j = (estado.jugadores||[]).find(x=>x.id==jugId);
    mostrarMiniPanel(slotIdx, partidoId, jugId, j);
    return;
  }
  // Slot vacío — abrir selector
  abrirSelectorTitular(slotIdx, partidoId);
}

function mostrarMiniPanel(slotIdx, partidoId, jugId, j) {
  _mpPartidoId = partidoId;
  _mpJugadorId = jugId;
  _mpSlotIdx = slotIdx;
  const panel = document.getElementById('miniPanel');
  document.getElementById('mpNombre').textContent = '#'+(j?j.numero:'?')+' '+(j?j.nombre.split(' ')[0]:'');
  // Position panel near center of screen for fast access
  panel.style.left = '50%';
  panel.style.transform = 'translateX(-50%)';
  panel.style.top = '35%';
  panel.classList.add('show');
}

function cerrarMiniPanel() {
  document.getElementById('miniPanel').classList.remove('show');
  _mpPartidoId = null;
  _mpJugadorId = null;
  _mpSlotIdx = null;
}

async function mpAccion(stat) {
  if (!_mpPartidoId || !_mpJugadorId) return;
  const pid = _mpPartidoId;
  const jid = _mpJugadorId;
  cerrarMiniPanel();
  await addStat(pid, jid, stat, 1);
}

function mpMover(){
  if(!_mpPartidoId) return;
  // Store slot to move from
  const slotIdx = _mpSlotIdx;
  const partidoId = _mpPartidoId;
  cerrarMiniPanel();
  moverPendiente = {slotIdx, partidoId};
  render();
  toast('🔀 Tocá la posición destino en la cancha');
}

async function hacerCambio(slotIdx, partidoId, jugIdEntra) {
  const p = (estado.partidos||[]).find(x=>x.id==partidoId);
  if (!p) return;
  if (!p.titulares) p.titulares = {};
  if (!p.cambios) p.cambios = [];
  const jugIdSale = p.titulares[slotIdx];
  p.titulares[slotIdx] = jugIdEntra;
  const jEntra = (estado.jugadores||[]).find(j=>j.id==jugIdEntra);
  const jSale = (estado.jugadores||[]).find(j=>j.id==jugIdSale);
  p.cambios.push({
    slot: slotIdx,
    entra: jugIdEntra, nombreEntra: jEntra?jEntra.nombre:'',
    sale: jugIdSale, nombreSale: jSale?jSale.nombre:'',
  });
  await guardar();
  render();
  toast('🔄 ' + (jEntra?jEntra.nombre:'') + ' entra · ' + (jSale?jSale.nombre:'') + ' sale');
}

function seleccionarSuplente(jugId, partidoId) {
  if (suplentePendiente === jugId) {
    // Deseleccionar si tocás el mismo
    suplentePendiente = null;
    toast('Cambio cancelado');
  } else {
    suplentePendiente = jugId;
    const j = (estado.jugadores||[]).find(x=>x.id==jugId);
    toast('🔄 ' + (j?j.nombre:'') + ' listo para entrar — tocá el titular que sale');
  }
  render();
}

function abrirSelectorTitular(slotIdx, partidoId) {
  const p = (estado.partidos||[]).find(x=>x.id==partidoId);
  if (!p) return;
  const slot = POSICIONES_CANCHA[slotIdx];
  const titularesOcupados = Object.values(p.titulares||{}).map(id=>String(id));
  const posBase = SLOT_POS_MAP[slot.pos] || '';
  const posMatch = (p) => (p||'').trim().toLowerCase() === posBase.trim().toLowerCase();
  const jugadores = (estado.jugadores||[])
    .filter(j => !lesionActiva(j.id))
    .filter(j => !titularesOcupados.includes(String(j.id)))
    .sort((a,b)=>{
      const aMatch = posMatch(a.posicion) ? 0 : 1;
      const bMatch = posMatch(b.posicion) ? 0 : 1;
      if(aMatch!==bMatch) return aMatch-bMatch;
      return (a.numero||0)-(b.numero||0);
    });

  // Sort: matching position first, then by number
  const jugadoresOrdenados = [
    ...jugadores.filter(j => j.posicion === slot.pos),
    ...jugadores.filter(j => j.posicion !== slot.pos)
  ];
  const hayCoincidencias = jugadores.some(j => j.posicion === slot.pos);

  let html = '<h2>Posición ' + slot.label + '</h2><div class="sub">' + slot.pos + ' · Elegí el titular</div>';
  const hayMatch = posBase && jugadores.some(j=>posMatch(j.posicion));
  if(hayMatch) html += '<div style="font-size:11px;color:var(--azul);letter-spacing:1px;font-weight:700;margin-bottom:4px">⭐ '+posBase+' primero</div>';
  html += '<input type="search" id="selectorSearch" placeholder="🔍 Nombre o número..." ' +
    'oninput="renderSelectorLista(this.value,' + slotIdx + ',' + partidoId + ')" ' +
    'style="width:100%;background:var(--blancof);border:2px solid var(--border);color:var(--txt);padding:11px 14px;border-radius:8px;font-size:16px;outline:none;margin:10px 0"/>';
  html += '<div id="selectorLista" style="max-height:48vh;overflow-y:auto;margin-bottom:12px">';
  if (!jugadoresOrdenados.length) {
    html += '<div style="text-align:center;padding:16px;color:var(--txt3)">Sin jugadores disponibles</div>';
  } else {
    if (hayCoincidencias) {
      html += '<div style="font-size:10px;color:var(--azul);letter-spacing:2px;font-weight:700;padding:4px 2px 6px">✓ ' + slot.pos.toUpperCase() + '</div>';
    }
    let primerOtro = true;
    jugadoresOrdenados.forEach(j => {
      const esPosicion = j.posicion === slot.pos;
      if (!esPosicion && primerOtro && hayCoincidencias) {
        html += '<div style="font-size:10px;color:var(--txt3);letter-spacing:2px;padding:8px 2px 6px">OTRAS POSICIONES</div>';
        primerOtro = false;
      }
      html += '<div onclick="asignarTitular(' + slotIdx + ',' + partidoId + ',' + j.id + ')" style="background:'+(esPosicion?'var(--azulclaro)':'var(--blancof)')+';border:'+(esPosicion?'2px solid var(--azul)':'1px solid var(--border)')+';border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer">' +
        '<div style="width:36px;height:36px;border-radius:50%;background:'+(esPosicion?'var(--azul)':'var(--txt3)')+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0">' + j.numero + '</div>' +
        '<div><div style="font-size:15px;font-weight:700">' + (j.apodo?j.apodo+' — ':'')+j.nombre + '</div><div style="font-size:12px;color:'+(esPosicion?'var(--azul)':'var(--txt3)')+'">' + j.posicion + '</div></div>' +
        (esPosicion ? '<div style="font-size:16px">⭐</div>' : '') +
        '</div>';
    });
  }
  html += '</div>';
  html += '<div class="modal-btns"><button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>';
  if (p.titulares && p.titulares[slotIdx]) {
    html += '<button class="btn-confirm red" onclick="quitarTitular(' + slotIdx + ',' + partidoId + ')">Quitar</button>';
  }
  html += '</div>';
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>{ const s=document.getElementById('selectorSearch'); if(s) s.focus(); }, 150);
}

function renderSelectorLista(filtro, slotIdx, partidoId) {
  const p = (estado.partidos||[]).find(x=>x.id==partidoId);
  if (!p) return;
  const slot = POSICIONES_CANCHA[slotIdx];
  const ocupados = Object.values(p.titulares||{}).map(id=>String(id));
  const todos = (estado.jugadores||[])
    .filter(j => !lesionActiva(j.id) && !ocupados.includes(String(j.id)))
    .filter(j => !filtro || fuzzyMatch(j.nombre, filtro) || String(j.numero).includes(filtro) || (j.apodo && fuzzyMatch(j.apodo, filtro)));
  // When filtering, show flat list by number; when not filtering, position first
  const jugs = filtro
    ? todos.sort((a,b)=>(a.numero||0)-(b.numero||0))
    : [...todos.filter(j=>j.posicion===slot.pos), ...todos.filter(j=>j.posicion!==slot.pos)];
  const lista = document.getElementById('selectorLista');
  if (!lista) return;
  if (!jugs.length) { lista.innerHTML = '<div style="text-align:center;padding:16px;color:var(--txt3)">Sin resultados</div>'; return; }
  let html = '';
  let primerOtro = true;
  jugs.forEach(j => {
    const esPosicion = !filtro && j.posicion === slot.pos;
    if (!filtro && !esPosicion && primerOtro && todos.some(x=>x.posicion===slot.pos)) {
      html += '<div style="font-size:10px;color:var(--txt3);letter-spacing:2px;padding:8px 2px 6px">OTRAS POSICIONES</div>';
      primerOtro = false;
    }
    html += '<div onclick="asignarTitular(' + slotIdx + ',' + partidoId + ',' + j.id + ')" style="background:'+(esPosicion?'var(--azulclaro)':'var(--blancof)')+';border:'+(esPosicion?'2px solid var(--azul)':'1px solid var(--border)')+';border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer">' +
      '<div style="width:36px;height:36px;border-radius:50%;background:'+(esPosicion?'var(--azul)':'var(--txt3)')+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0">' + j.numero + '</div>' +
      '<div><div style="font-size:15px;font-weight:700">' + (j.apodo?j.apodo+' — ':'')+j.nombre + '</div><div style="font-size:12px;color:'+(esPosicion?'var(--azul)':'var(--txt3)')+'">' + j.posicion + '</div></div>' +
      (esPosicion ? '<div style="font-size:16px">⭐</div>' : '') +
      '</div>';
  });
  lista.innerHTML = html;
}

async function asignarTitular(slotIdx, partidoId, jugId) {
  const p = (estado.partidos||[]).find(x=>x.id==partidoId);
  if (!p) return;
  if (!p.titulares) p.titulares = {};
  // Verificar si el jugador ya está en otro slot — si sí, hacer cambio
  const slotAnterior = Object.keys(p.titulares).find(k=>String(p.titulares[k])===String(jugId));
  if (slotAnterior !== undefined) {
    // Intercambiar
    const jugAnteriorEnNuevoSlot = p.titulares[slotIdx];
    p.titulares[slotAnterior] = jugAnteriorEnNuevoSlot || undefined;
    if (!jugAnteriorEnNuevoSlot) delete p.titulares[slotAnterior];
  }
  p.titulares[slotIdx] = jugId;
  // Registrar cambio si ya había alguien
  const jug = (estado.jugadores||[]).find(j=>j.id===jugId);
  if (!p.cambios) p.cambios = [];
  p.cambios.push({minuto: p.minuto||'?', entrada: jugId, nombreEntrada: jug?jug.nombre:'', slot: slotIdx});
  await guardar();
  cerrarModal();
  render();
  toast('✅ ' + (jug?jug.nombre:'Jugador') + ' → posición ' + POSICIONES_CANCHA[slotIdx].label);
}

async function quitarTitular(slotIdx, partidoId) {
  const p = (estado.partidos||[]).find(x=>x.id==partidoId);
  if (!p || !p.titulares) return;
  delete p.titulares[slotIdx];
  await guardar(); cerrarModal(); render();
}

function renderSuplentes(p) {
  const titularesIds = Object.values(p.titulares||{}).filter(Boolean).map(id=>String(id));
  const suplentes = (estado.jugadores||[])
    .filter(j => !titularesIds.includes(String(j.id)))
    .sort((a,b)=>(a.numero||0)-(b.numero||0));

  let html = '<div class="sec-title" style="margin-top:4px">🔄 Suplentes</div>';
  if (suplentePendiente !== null) {
    html += '<div style="background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#92400e">'+
      '⚡ Tocá el titular en la cancha que va a salir</div>';
  }
  if (!suplentes.length) { return html + '<div style="color:var(--txt3);font-size:13px;padding:8px 0">Todos en cancha</div>'; }
  suplentes.forEach(j => {
    const ps = p.stats && p.stats[String(j.id)] ? p.stats[String(j.id)] : {};
    const seleccionado = suplentePendiente === j.id;
    html += '<div class="suplente-row" onclick="seleccionarSuplente(' + j.id + ',' + p.id + ')" style="cursor:pointer;' +
      (seleccionado ? 'background:#dbeafe;border-color:var(--azul);border-width:2px;' : '') + '">' +
      '<div class="suplente-num" style="' + (seleccionado?'background:var(--azul);color:#fff;border-color:var(--azul)':'') + '">' + j.numero + '</div>' +
      '<div style="flex:1"><div style="font-size:14px;font-weight:600">' + (j.apodo?j.apodo+' ':'')+j.nombre + '</div>' +
      '<div style="font-size:11px;color:var(--txt3)">' + j.posicion + '</div></div>' +
      (seleccionado
        ? '<div style="font-size:12px;font-weight:700;color:var(--azul)">✓ ENTRA</div>'
        : '<div style="font-size:12px;color:var(--txt3)">🛡' + (ps.tackles||0) + ' 🏉' + (ps.tries||0) + '</div>') +

  return html;

            '</div>'+
          '</div>'+
        '</div>';
      });
    }
  }

  html+='</div>';
  document.getElementById('content').innerHTML=html;
  // Attach touch-safe listeners — only fire if not scrolling
  setTimeout(()=>{
    document.querySelectorAll('.slot-hit').forEach(el=>{
      let touchStartY = 0;
      el.addEventListener('touchstart', function(e){
        touchStartY = e.touches[0].clientY;
      }, {passive:true});
      el.addEventListener('touchend', function(e){
        const delta = Math.abs(e.changedTouches[0].clientY - touchStartY);
        if (delta > 8) return; // fue scroll, ignorar
        e.preventDefault();
        tocarsSlot(parseInt(this.dataset.idx), parseInt(this.dataset.pid));
      }, {passive:false});
    });
  }, 50);
  if(canchaTab==='lista'&&busquedaLive){
    const inp=document.getElementById('liveSearchInput');
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  }
}
async function cambiarScore(delta,esTiburones,restar=false){
  const p=(estado.partidos||[]).find(x=>!x.finalizado);
  if(!p)return;
  // Si somos visitante, Tiburones es puntosVisitante y el rival es puntosLocal
  const tiburones_es_local = (p.condicion||'local')==='local';
  const campoTiburones = tiburones_es_local ? 'puntosLocal' : 'puntosVisitante';
  const campoRival = tiburones_es_local ? 'puntosVisitante' : 'puntosLocal';
  if(esTiburones&&!restar) p[campoTiburones]=Math.max(0,(p[campoTiburones]||0)+delta);
  else if(!esTiburones&&!restar) p[campoRival]=Math.max(0,(p[campoRival]||0)+delta);
  await guardar();render();
}

async function addStat(partidoId,jugadorId,stat,val){
  const p=(estado.partidos||[]).find(x=>x.id==partidoId);
  if(!p)return;
  if(!p.stats)p.stats={};
  const key=String(jugadorId);
  if(!p.stats[key])p.stats[key]={tackles:0,tries:0,pases:0,metros:0,tarjetasAm:0,tarjetasRo:0,ultimaStat:null};
  p.stats[key][stat]=(p.stats[key][stat]||0)+val;
  p.stats[key].ultimaStat=stat;
  await guardar();render();
  const j=(estado.jugadores||[]).find(x=>String(x.id)===key);
  toast('✅ '+stat+' → '+(j?j.nombre:''));
}

async function restarUltimaStat(partidoId,jugadorId){
  const p=(estado.partidos||[]).find(x=>x.id==partidoId);
  const key=String(jugadorId);
  if(!p||!p.stats||!p.stats[key])return;
  const s=p.stats[key];
  const ultima=s.ultimaStat;
  if(ultima&&s[ultima]>0){s[ultima]--;toast('↩ Deshecho: '+ultima);}
  await guardar();render();
}

function editarMetros(partidoId,jugadorId,actual){
  const metros=prompt('Metros para este jugador:',actual||0);
  if(metros===null)return;
  const val=parseInt(metros)||0;
  addStat(partidoId,jugadorId,'metros',val-(actual||0));
}

// Helper: calcula W/L/D considerando si Tiburones es local o visitante
function getRes(p){
  if(p.resultadoOverride) return p.resultadoOverride;
  const esLocal=(p.condicion||'local')==='local';
  const pt=esLocal?p.puntosLocal:p.puntosVisitante;
  const pr=esLocal?p.puntosVisitante:p.puntosLocal;
  return pt>pr?'W':pt<pr?'L':'D';
}

  await guardar();render();toast('✅ Partido finalizado');
}

function setEditRes(r){
  window._editRes = r;
  const styles = {
    W: {btn:'eW', border:'var(--verde)', bg:'var(--verde)', color:'#fff'},
    D: {btn:'eD', border:'#ca8a04', bg:'#fef9c3', color:'#92400e'},
    L: {btn:'eL', border:'var(--rojo)', bg:'rgba(220,38,38,0.1)', color:'var(--rojo)'}
  };
  ['W','D','L'].forEach(k=>{
    const b=document.getElementById('e'+k);
    if(!b)return;
    const active = k===r;
    b.style.borderColor = active ? styles[k].border : 'var(--border)';
    b.style.background  = active ? styles[k].bg      : 'var(--blancof)';
    b.style.color       = active ? styles[k].color    : 'var(--txt3)';
  });
}

async function confirmarEditarPartido(id){

  // Ajustar puntos según condicion para que getRes() calcule bien
  // Si el resultado manual difiere del calculado por score, forzamos con override
  p.resultadoOverride = window._editRes;

  else        { p.puntosVisitante=pTib; p.puntosLocal=pRiv; }

function verDetallePartido(id){

      const total=((s.tackles||0))+(s.tries||0)*3;

        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+

// RANKING
// ═══════════════════════════════════════
function renderRanking(){
  const metricas=['tackles','tries','pases','metros'];
  const labels={tackles:'Tackles',tries:'Tries',pases:'Pases',metros:'Metros'};
  const partidos=(estado.partidos||[]).filter(p=>p.finalizado);

  // Agrupar por fecha
  const jornadasMap={};
  partidos.forEach(p=>{ if(!jornadasMap[p.fecha])jornadasMap[p.fecha]=[]; jornadasMap[p.fecha].push(p); });
  const fechas=Object.keys(jornadasMap).sort().reverse();

  // Jornada selector
  let html='<div style="padding-top:8px">'+
    '<div class="tab-bar">'+
    metricas.map(m=>'<button class="'+(rankingMetrica===m?'active':'')+'" onclick="rankingMetrica=\''+m+'\';renderRanking()">'+labels[m]+'</button>').join('')+
    '</div>'+
    '<div style="margin:10px 0">'+
      '<div style="font-size:10px;color:var(--txt3);letter-spacing:2px;margin-bottom:4px">JORNADA</div>'+
      '<select id="jornadaSel" onchange="rankingJornada=this.value;renderRanking()" style="width:100%;padding:12px 14px;border-radius:10px;border:2px solid var(--azul);background:var(--azulclaro);color:var(--azul);font-size:15px;font-weight:700;outline:none;appearance:auto">'+
        '<option value="total"'+(rankingJornada==='total'?' selected':'')+'>📊 Total acumulado</option>'+
        fechas.map(f=>'<option value="'+f+'"'+(rankingJornada===f?' selected':'')+'>📅 '+f+' ('+jornadasMap[f].length+' partido'+(jornadasMap[f].length>1?'s':'')+') </option>').join('')+
      '</select>'+
    '</div>';

  // Build ranking data
  let ranking;
  if(rankingJornada==='total'){
    ranking=(estado.jugadores||[])
      .map(j=>{const s=statsJugador(j);return{j,val:s[rankingMetrica]||0};})
      .filter(x=>x.val>0)
      .sort((a,b)=>b.val-a.val);
  } else {
    const psJornada=jornadasMap[rankingJornada];
    if(!psJornada){ html+='<div class="empty">Jornada no encontrada</div></div>'; document.getElementById('content').innerHTML=html; return; }
    ranking=(estado.jugadores||[])
      .map(j=>{
        // Sum stats across all partidos of that date
        let val=0;
        psJornada.forEach(p=>{
          const s=(p.stats&&p.stats[String(j.id)])||{};
          val+=(s[rankingMetrica]||0);
        });
        return{j,val};
      })
      .filter(x=>x.val>0)
      .sort((a,b)=>b.val-a.val);
  }

  const max=ranking[0]?.val||1;
  if(!ranking.length){html+='<div class="empty">Sin datos para esta jornada</div>';}
  ranking.forEach(({j,val},i)=>{
    const posClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    html+='<div class="ranking-card">'+
      '<div class="rank-pos '+posClass+'">'+(medal||i+1)+'</div>'+
      '<div style="flex:1;cursor:pointer" onclick="verFicha('+j.id+')">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div><div style="font-family:\'Oswald\',sans-serif;font-size:15px">'+j.nombre+'</div>'+
          '<div style="font-size:11px;color:var(--txt3)">'+j.posicion+'</div></div>'+
          '<div style="font-family:\'Oswald\',sans-serif;font-size:22px;font-weight:700;color:var(--azul)">'+val+'</div>'+
        '</div>'+
        '<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+(val/max*100)+'%"></div></div>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

function renderLesiones(){
  const lesiones=estado.lesiones||[];
  const activas=lesiones.filter(l=>l.activa);
  const historial=lesiones.filter(l=>!l.activa);
  let html='<div style="padding-top:8px">';

  if(activas.length){
    html+='<div class="sec-title" style="color:var(--rojo)">🔴 Lesiones Activas</div>';
    activas.forEach(l=>{
      const j=(estado.jugadores||[]).find(x=>String(x.id)===String(l.jugadorId));
      html+='<div class="lesion-card">'+
        '<div class="lesion-dot activa"></div>'+
        '<div style="flex:1">'+
          '<div style="font-family:\'Oswald\',sans-serif;font-size:15px">'+(j?j.nombre:'Jugador')+'</div>'+
          '<div style="font-size:12px;color:var(--rojo);margin-top:2px">'+l.tipo+' · Desde: '+l.fecha+'</div>'+
          (l.descripcion?'<div style="font-size:13px;color:var(--txt3);margin-top:4px">'+l.descripcion+'</div>':'')+
          '<div style="margin-top:8px">'+
            (canEdit()||isCoach()?'<button onclick="resolverLesion(\''+l.id+'\')" style="background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.3);color:var(--verde);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:\'Oswald\',sans-serif;font-size:11px;letter-spacing:1px">✓ RECUPERADO</button>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    });
  }

  if(!activas.length&&!historial.length){html+='<div class="empty">🏥 Sin lesiones registradas</div>';}

  if(historial.length){
    html+='<div class="sec-title" style="margin-top:14px">✅ Historial</div>';
    [...historial].reverse().forEach(l=>{
      const j=(estado.jugadores||[]).find(x=>String(x.id)===String(l.jugadorId));
      html+='<div class="lesion-card">'+
        '<div class="lesion-dot resuelta"></div>'+
        '<div style="flex:1">'+
          '<div style="font-family:\'Oswald\',sans-serif;font-size:14px;color:var(--txt2)">'+(j?j.nombre:'Jugador')+'</div>'+
          '<div style="font-size:12px;color:var(--txt3);margin-top:2px">'+l.tipo+' · '+l.fecha+(l.fechaAlta?' → '+l.fechaAlta:'')+'</div>'+
          (l.descripcion?'<div style="font-size:12px;color:var(--txt3);margin-top:2px">'+l.descripcion+'</div>':'')+
        '</div>'+
      '</div>';
    });
  }
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

async function resolverLesion(id){
  const l=(estado.lesiones||[]).find(x=>String(x.id)===String(id));
  if(!l)return;
  l.activa=false;
  l.fechaAlta=new Date().toLocaleDateString('es-AR');
  await guardar();render();toast('✅ Jugador dado de alta');
}

// ASISTENCIA
// ═══════════════════════════════════════
function renderAsistencia(){
  const asist=estado.asistencia||{};
  const fechaAsist=asist[asistenciaFecha]||{};
  const jugs=(estado.jugadores||[]).sort((a,b)=>(a.numero||0)-(b.numero||0));
  let html='<div style="padding-top:8px">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
      '<input type="date" value="'+asistenciaFecha+'" onchange="asistenciaFecha=this.value;renderAsistencia()" style="background:var(--blanco);border:1px solid var(--border);color:var(--txt);padding:10px 12px;border-radius:8px;font-family:inherit;font-size:16px;outline:none;flex:1"/>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:14px">'+
      '<button onclick="marcarTodos(true)" style="flex:1;background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.3);color:var(--verde);padding:10px;border-radius:8px;cursor:pointer;font-family:\'Oswald\',sans-serif;font-size:11px;letter-spacing:2px">✓ TODOS</button>'+
      '<button onclick="marcarTodos(false)" style="flex:1;background:#fef2f2;border:1px solid #fecaca;color:var(--rojo);padding:10px;border-radius:8px;cursor:pointer;font-family:\'Oswald\',sans-serif;font-size:11px;letter-spacing:2px">✕ NINGUNO</button>'+
    '</div>';

  if(!jugs.length){html+='<div class="empty">Sin jugadores</div>';}
  jugs.forEach(j=>{
    const pres=fechaAsist[j.id];
    html+='<div onclick="toggleAsistencia('+j.id+')" style="background:var(--blanco);border:2px solid '+(pres===true?'var(--verde)':pres===false?'#fca5a5':'var(--border)')+';border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-family:\'Oswald\',sans-serif;font-size:14px;flex-shrink:0">'+j.numero+'</div>'+
      '<div style="flex:1"><div style="font-family:\'Oswald\',sans-serif;font-size:15px">'+j.nombre+'</div><div style="font-size:12px;color:var(--txt3)">'+j.posicion+'</div></div>'+
      '<div style="font-family:\'Oswald\',sans-serif;font-size:13px;font-weight:700;color:'+(pres===true?'var(--verde)':pres===false?'var(--rojo)':'var(--txt3)')+'">'+
        (pres===true?'✓ PRESENTE':pres===false?'✕ AUSENTE':'—')+'</div>'+
    '</div>';
  });

  // Historial de asistencia
  const fechas=Object.keys(asist).sort().reverse().slice(0,5);
  if(fechas.length>1){
    html+='<div class="sec-title" style="margin-top:16px">Últimas fechas</div>';
    fechas.forEach(f=>{
      const fa=asist[f]||{};
      const pres=Object.values(fa).filter(v=>v===true).length;
      const total=Object.values(fa).length;
      html+='<div style="background:var(--blanco);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-family:\'Oswald\',sans-serif;font-size:14px">'+f+'</span>'+
        '<span style="font-size:13px;color:var(--txt3)">'+pres+'/'+total+' presentes</span>'+
      '</div>';
    });
  }

  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

async function toggleAsistencia(jugadorId){
  if(!estado.asistencia)estado.asistencia={};
  if(!estado.asistencia[asistenciaFecha])estado.asistencia[asistenciaFecha]={};
  const actual=estado.asistencia[asistenciaFecha][jugadorId];
  estado.asistencia[asistenciaFecha][jugadorId]=actual===true?false:actual===false?undefined:true;
  if(estado.asistencia[asistenciaFecha][jugadorId]===undefined)delete estado.asistencia[asistenciaFecha][jugadorId];
  await guardar();renderAsistencia();
}

async function marcarTodos(presente){
  if(!estado.asistencia)estado.asistencia={};
  if(!estado.asistencia[asistenciaFecha])estado.asistencia[asistenciaFecha]={};
  (estado.jugadores||[]).forEach(j=>{estado.asistencia[asistenciaFecha][j.id]=presente;});
  await guardar();renderAsistencia();
}

function elegirFechaAsistencia(){
  const fecha=prompt('Fecha (YYYY-MM-DD):',asistenciaFecha);
  if(fecha){asistenciaFecha=fecha;renderAsistencia();}
}

  const m=document.getElementById('modal');
  m.innerHTML='<h2>Editar Usuario</h2><div class="sub">'+u.nombre+'</div>'+
    '<div class="form-group"><label>Nombre</label><input type="text" id="uNombre" value="'+u.nombre+'"/></div>'+
    '<div class="form-group"><label>Rol</label>'+
      '<select id="uRol" style="width:100%;background:var(--blancof);border:2px solid var(--border);color:var(--txt);padding:11px 14px;border-radius:8px;font-size:15px;outline:none">'+
        '<option value="jugador"'+(u.rol==='jugador'?' selected':'')+'>🏉 Jugador</option>'+
        '<option value="coach"'+(u.rol==='coach'?' selected':'')+'>🎽 Coach</option>'+
        '<option value="admin"'+(u.rol==='admin'?' selected':'')+'>👑 Admin</option>'+
      '</select>'+
    '</div>'+
    '<div class="form-group"><label>PIN nuevo (dejá vacío para no cambiar)</label>'+
      '<input type="number" id="uPin" inputmode="numeric" placeholder="•••• " style="letter-spacing:8px;font-size:20px;text-align:center"/></div>'+
    '<div class="modal-btns"><button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>'+
    '<button class="btn-confirm green" onclick="confirmarEditarUsuario(&quot;'+id+'&quot;)">GUARDAR</button></div>';
  document.getElementById('overlay').classList.add('open');
}

async function confirmarEditarUsuario(id){
  const u=(estado.usuarios||[]).find(x=>String(x.id)===String(id));
  if(!u)return;
  const nombre=document.getElementById('uNombre').value.trim()||u.nombre;
  const rol=document.getElementById('uRol').value;
  const pinVal=String(document.getElementById('uPin').value).trim();
  if(pinVal&&(pinVal.length!==4||!/^\d{4}$/.test(pinVal))){toast('⚠️ El PIN debe tener 4 dígitos');return;}
  u.nombre=nombre; u.rol=rol;
  if(pinVal) u.pin=pinVal;
  // Update session if editing self
  if(String(currentUser.id)===String(id)) currentUser=u;
  await guardar();cerrarModal();renderConfig();toast('✅ Usuario actualizado');
}

async function eliminarUsuario(id){
  if(!confirm('¿Eliminar este usuario?'))return;
  estado.usuarios=(estado.usuarios||[]).filter(x=>String(x.id)!==String(id));
  await guardar();renderConfig();toast('✅ Usuario eliminado');
}

// ═══════════════════════════════════════
// SISTEMA DE VOZ
// ═══════════════════════════════════════
let _voiceRec = null;
let _voiceListening = false;

const TRY_ALIASES = ['try','trae','trai','tres','rei','tri','troy','trey','tray','tré','tre'];
const TACKLE_ALIASES = ['tackle','tackl','tackel','takle','tacle','taclee','tacl','tack','tackleo'];
const PUNTO_LOCAL = ['punto local','gol local','tanto local','puntos local'];
const PUNTO_VISIT = ['punto visitante','punto rival','gol rival','tanto visitante','gol visitante'];

function voiceInit(){
  if(_voiceRec) return true;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('❌ Tu navegador no soporta voz'); return false; }
  _voiceRec = new SR();
  _voiceRec.lang = 'es-AR';
  _voiceRec.interimResults = false;
  _voiceRec.maxAlternatives = 5;
  _voiceRec.onresult = voiceOnResult;
  _voiceRec.onerror = (e) => {
    _voiceListening = false;
    voiceSetState('idle');
    if(e.error !== 'no-speech') voiceShowToast('❌ '+e.error, 2000);
  };
  _voiceRec.onend = () => { _voiceListening = false; voiceSetState('idle'); };
  return true;
}

function voiceStart(e){
  e.preventDefault();
  if(!voiceInit()) return;
  if(_voiceListening) return;
  try{ _voiceRec.start(); _voiceListening=true; voiceSetState('listening'); voiceShowToast('🎤 Escuchando...', 10000); }
  catch(err){ voiceSetState('idle'); }
}

function voiceStop(e){
  e.preventDefault();
  if(_voiceRec && _voiceListening){ try{ _voiceRec.stop(); }catch(err){} }
}

function voiceSetState(s){
  const btn = document.getElementById('voiceBtn');
  if(!btn) return;
  btn.className = s;
  btn.textContent = s==='listening'?'🔴':s==='success'?'✅':'🎤';
  if(s==='success') setTimeout(()=>voiceSetState('idle'), 1500);
}

function voiceShowToast(msg, dur=2000){
  const t = document.getElementById('voiceToast');
  if(!t) return;
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._to);
  t._to = setTimeout(()=>{ t.style.display='none'; }, dur);
}

function voiceOnResult(e){
  // Get all alternatives
  const texts = Array.from(e.results[0]).map(a => a.transcript.toLowerCase().trim());
  voiceShowToast('💬 "'+texts[0]+'"', 2000);

  for(const text of texts){
    if(voiceParsear(text)) return;
  }
  // Show all alternatives to help debug
  const alts = texts.slice(0,3).join(' | ');
  voiceShowToast('❓ "'+alts+'"', 4000);
}

function voiceParsear(text){
  const p = (estado.partidos||[]).find(x=>!x.finalizado);
  if(!p) return false;

  // Check punto local / visitante first
  if(PUNTO_LOCAL.some(k=>text.includes(k))){
    cambiarScore(1, true);
    voiceSetState('success');
    voiceShowToast('✅ Punto local', 2000);
    return true;
  }
  if(PUNTO_VISIT.some(k=>text.includes(k))){
    cambiarScore(1, false);
    voiceSetState('success');
    voiceShowToast('✅ Punto visitante', 2000);
    return true;
  }

  // Detect action word
  let accion = null;
  let textoSinAccion = text;

  const palabrasTexto = text.split(/\s+/);
  for(const a of TRY_ALIASES){
    if(palabrasTexto.some(p=>p===a||p.startsWith(a))){
      accion = 'tries';
      textoSinAccion = palabrasTexto.filter(p=>!p.startsWith(a)).join(' ').trim();
      break;
    }
  }
  if(!accion){
    for(const a of TACKLE_ALIASES){
      if(palabrasTexto.some(p=>p===a||p.startsWith(a))){
        accion = 'tackles';
        textoSinAccion = palabrasTexto.filter(p=>!p.startsWith(a)).join(' ').trim();
        break;
      }
    }
  }
  if(!accion) return false;

  // Find player — strict matching first, fuzzy only as fallback
  const jugadores = estado.jugadores||[];
  let mejor = null;
  let mejorScore = 0;

  // Normalize: remove accents, lowercase, normalize ll/y/j confusion
  function norm(s){
    return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/ll/g,'j').replace(/y(?=[aeiou])/g,'j').trim();
  }
  const textoNorm = norm(textoSinAccion);
  const palabras = textoNorm.split(/\s+/).filter(p=>p.length>=2);

  for(const j of jugadores){
    let score = 0;
    const apodoNorm = norm(j.apodo);
    const nombrePartes = j.nombre.split(' ').map(norm);

    // Priority 1: exact apodo match in any word
    if(apodoNorm && palabras.some(p => p === apodoNorm)){
      score = 100;
    }
    // Priority 2: apodo contained in text (whole word)
    else if(apodoNorm && palabras.some(p => apodoNorm.includes(p) && p.length >= apodoNorm.length-1)){
      score = 80;
    }
    // Priority 3: exact nombre part match
    else if(nombrePartes.some(n => n.length>=3 && palabras.some(p => p === n))){
      score = 70;
    }
    // Priority 4: nombre part starts with spoken word (min 4 chars)
    else if(nombrePartes.some(n => n.length>=4 && palabras.some(p => p.length>=4 && n.startsWith(p)))){
      score = 50;
    }
    // Priority 5: spoken word starts with nombre part (min 4 chars)
    else if(nombrePartes.some(n => n.length>=4 && palabras.some(p => p.length>=4 && p.startsWith(n)))){
      score = 40;
    }


    if(score > mejorScore){ mejorScore=score; mejor=j; }
  }

  // Minimum confidence threshold — don't guess if score too low
  const minScore = 40;
  if(mejorScore < minScore){ mejor = null; }
  else {
    // Check for ambiguity — if 2+ players have same score, don't guess
    const empatados = jugadores.filter(j => {
      let s = 0;
      const an = norm(j.apodo); const np = j.nombre.split(' ').map(norm);
      if(an && palabras.some(p=>p===an)) s=100;
      else if(an && palabras.some(p=>an.includes(p)&&p.length>=an.length-1)) s=80;
      else if(np.some(n=>n.length>=3&&palabras.some(p=>p===n))) s=70;
      else if(np.some(n=>n.length>=4&&palabras.some(p=>p.length>=4&&n.startsWith(p)))) s=50;
      else if(np.some(n=>n.length>=4&&palabras.some(p=>p.length>=4&&p.startsWith(n)))) s=40;

      return s === mejorScore;
    });
    if(empatados.length > 1){
      voiceShowToast('❓ Ambiguo: '+empatados.map(j=>j.apodo||j.nombre.split(' ')[0]).join(' o ')+'?', 3000);
      return false;
    }
  }

  if(!mejor){
    voiceShowToast('❓ Jugador no encontrado: "'+textoSinAccion+'"', 3000);
    return false;
  }

  addStat(p.id, mejor.id, accion, 1);
  voiceSetState('success');
  const label = accion==='tries'?'Try':'Tackle';
  voiceShowToast('✅ '+label+' → '+(mejor.apodo||mejor.nombre.split(' ')[0]), 2000);
  return true;
}

document.addEventListener('touchstart', function(e){
  const panel = document.getElementById('miniPanel');
  if(panel && panel.classList.contains('show') && !panel.contains(e.target)){
    cerrarMiniPanel();
  }
}, {passive:true});
