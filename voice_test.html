<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Voice Test</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>Web Speech API Test</h2>
<button id="btn" style="padding:20px;font-size:18px;background:#003087;color:#fff;border:none;border-radius:10px">🎤 Hablar</button>
<div id="result" style="margin-top:20px;font-size:16px;color:#333"></div>
<div id="log" style="margin-top:10px;font-size:12px;color:#666"></div>
<script>
const btn = document.getElementById('btn');
const result = document.getElementById('result');
const log = document.getElementById('log');

if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
  result.textContent = '❌ Web Speech API no soportada en este navegador';
} else {
  log.textContent = '✅ Web Speech API disponible';
  
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'es-AR';
  rec.interimResults = false;
  rec.maxAlternatives = 3;
  
  let listening = false;
  
  btn.addEventListener('mousedown', () => { rec.start(); listening=true; btn.style.background='#dc2626'; btn.textContent='🔴 Escuchando...'; });
  btn.addEventListener('mouseup', () => { if(listening){rec.stop();} });
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); rec.start(); listening=true; btn.style.background='#dc2626'; btn.textContent='🔴 Escuchando...'; });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); if(listening){rec.stop();} });
  
  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase();
    result.textContent = '📝 Escuché: "' + text + '"';
    
    // Test parsing
    if(text.includes('tackle')) result.textContent += ' → TACKLE detectado';
    else if(text.includes('try')) result.textContent += ' → TRY detectado';
    else if(text.includes('punto local')) result.textContent += ' → PUNTO LOCAL detectado';
    else if(text.includes('punto visitante') || text.includes('punto rival')) result.textContent += ' → PUNTO VISITANTE detectado';
    
    log.textContent = 'Alternativas: ' + Array.from(e.results[0]).map(a=>a.transcript).join(' | ');
  };
  
  rec.onerror = (e) => { result.textContent = '❌ Error: ' + e.error; btn.style.background='#003087'; btn.textContent='🎤 Hablar'; listening=false; };
  rec.onend = () => { btn.style.background='#003087'; btn.textContent='🎤 Hablar'; listening=false; };
}
</script>
</body>
</html>
